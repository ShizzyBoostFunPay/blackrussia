    // Частицы
    const canvas = document.getElementById('particles-canvas');
    let ctx = canvas.getContext('2d');
    let width, height, particles = [];
    function initParticles() {
        particles = [];
        for(let i=0;i<90;i++) particles.push({
            x: Math.random()*width, y: Math.random()*height, radius: Math.random()*2+1.2,
            vx: (Math.random()-0.5)*0.4, vy: (Math.random()-0.5)*0.2+0.1,
            color: `rgba(255,217,102,${Math.random()*0.5+0.2})`
        });
    }
    function resizeCanvas() { width = window.innerWidth; height = window.innerHeight; canvas.width = width; canvas.height = height; initParticles(); }
    function drawParticles() {
        if(!ctx) return;
        ctx.clearRect(0,0,width,height);
        ctx.fillStyle='#1a1a1a';
        ctx.fillRect(0,0,width,height);
        for(let p of particles) {
            ctx.beginPath();
            ctx.arc(p.x, p.y, p.radius, 0, Math.PI*2);
            ctx.fillStyle = p.color;
            ctx.fill();
            p.x += p.vx; p.y += p.vy;
            if(p.x<0) p.x=width; if(p.x>width) p.x=0;
            if(p.y<0) p.y=height; if(p.y>height) p.y=0;
        }
        requestAnimationFrame(drawParticles);
    }
    window.addEventListener('resize', resizeCanvas);
    resizeCanvas();
    drawParticles();

    function renderAll() {
        const container = document.getElementById('commandsContainer');
        const navContainer = document.getElementById('navLinks');
        if(!container) return;
        container.innerHTML = '';
        navContainer.innerHTML = '';
        commandsData.forEach((cat, idx) => {
            const catId = `cat-${idx}`;
            const link = document.createElement('a');
            link.href = `#${catId}`;
            link.innerHTML = `<i class="${cat.icon}"></i> ${cat.name}`;
            navContainer.appendChild(link);
            const card = document.createElement('div');
            card.className = 'card';
            card.id = catId;
            card.innerHTML = `<h2><i class="${cat.icon}"></i> ${cat.name}</h2><div class="cmd-grid" id="grid-${catId}"></div>`;
            const grid = card.querySelector(`.cmd-grid`);
            cat.commands.forEach(([cmd, desc]) => {
                const cmdDiv = document.createElement('div');
                cmdDiv.className = 'cmd-card';
                const codeSpan = document.createElement('span');
                codeSpan.className = 'cmd-code';
                codeSpan.textContent = cmd;
                codeSpan.setAttribute('data-cmd', cmd.split(' ')[0]);
                codeSpan.addEventListener('click', (e) => { e.stopPropagation(); copyToClipboard(cmd.split(' ')[0]); });
                const descSpan = document.createElement('span');
                descSpan.className = 'cmd-desc';
                descSpan.textContent = desc;
                cmdDiv.appendChild(codeSpan);
                cmdDiv.appendChild(descSpan);
                grid.appendChild(cmdDiv);
            });
            container.appendChild(card);
        });
    }

    function copyToClipboard(text) {
        navigator.clipboard.writeText(text);
        const toast = document.getElementById('copyToast');
        toast.style.opacity = '1';
        setTimeout(()=>{ toast.style.opacity = '0'; }, 1500);
    }

    renderAll();
