    const canvas = document.getElementById('particles-canvas');
    let ctx = canvas.getContext('2d');
    let width, height;
    let particles = [];
    const PARTICLE_COUNT = 90;
    function initParticles() {
        particles = [];
        for(let i = 0; i < PARTICLE_COUNT; i++) {
            particles.push({
                x: Math.random() * width,
                y: Math.random() * height,
                radius: Math.random() * 2 + 1.2,
                vx: (Math.random() - 0.5) * 0.4,
                vy: (Math.random() - 0.5) * 0.2 + 0.1,
                color: `rgba(255, 217, 102, ${Math.random() * 0.5 + 0.2})`
            });
        }
    }
    function resizeCanvas() {
        width = window.innerWidth;
        height = window.innerHeight;
        canvas.width = width;
        canvas.height = height;
        initParticles();
    }
    function drawParticles() {
        if(!ctx) return;
        ctx.clearRect(0, 0, width, height);
        ctx.fillStyle = '#1a1a1a';
        ctx.fillRect(0, 0, width, height);
        for(let p of particles) {
            ctx.beginPath();
            ctx.arc(p.x, p.y, p.radius, 0, Math.PI * 2);
            ctx.fillStyle = p.color;
            ctx.fill();
            p.x += p.vx;
            p.y += p.vy;
            if(p.x < 0) p.x = width;
            if(p.x > width) p.x = 0;
            if(p.y < 0) p.y = height;
            if(p.y > height) p.y = 0;
        }
        requestAnimationFrame(drawParticles);
    }
    window.addEventListener('resize', resizeCanvas);
    resizeCanvas();
    drawParticles();

    // Парсинг строки "команда - описание"
    function parseCommand(str) {
        let parts = str.split(' - ');
        if(parts.length === 1) return { cmd: parts[0].trim(), desc: "" };
        let cmd = parts[0].trim();
        let desc = parts.slice(1).join(' - ').trim();
        return { cmd, desc };
    }

    // Рендер всех категорий
    function renderCategories() {
        const container = document.getElementById('categories-container');
        const navContainer = document.getElementById('nav-links');
        if(!container) return;
        container.innerHTML = '';
        navContainer.innerHTML = '';
        categoriesData.forEach((cat, idx) => {
            const catId = `cat-${idx}`;
            // ссылка в навигации
            const link = document.createElement('a');
            link.href = `#${catId}`;
            link.innerHTML = `<i class="${cat.icon.split(' ')[0]} ${cat.icon.split(' ')[1]}" style="margin-right: 5px;"></i> ${cat.name}`;
            navContainer.appendChild(link);
            // карточка категории
            const card = document.createElement('div');
            card.className = 'category-card';
            card.id = catId;
            card.innerHTML = `
                <div class="category-title">
                    <i class="${cat.icon}"></i> ${cat.name}
                </div>
                <div class="commands-list" id="list-${catId}"></div>
            `;
            const listDiv = card.querySelector(`.commands-list`);
            cat.commands.forEach(cmdStr => {
                const { cmd, desc } = parseCommand(cmdStr);
                const itemDiv = document.createElement('div');
                itemDiv.className = 'command-item';
                const codeSpan = document.createElement('span');
                codeSpan.className = 'cmd-code';
                codeSpan.innerHTML = `${cmd} <i class="fas fa-copy"></i>`;
                codeSpan.addEventListener('click', (e) => {
                    e.stopPropagation();
                    copyToClipboard(cmd);
                });
                const descSpan = document.createElement('span');
                descSpan.className = 'cmd-desc';
                descSpan.textContent = desc || '';
                itemDiv.appendChild(codeSpan);
                if(desc) itemDiv.appendChild(descSpan);
                listDiv.appendChild(itemDiv);
            });
            container.appendChild(card);
        });
    }

    function copyToClipboard(text) {
        navigator.clipboard.writeText(text);
        const toast = document.getElementById('copyToast');
        toast.style.opacity = '1';
        setTimeout(() => { toast.style.opacity = '0'; }, 1500);
    }

    renderCategories();
</script>
</body>
</html>
